name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

jobs:
  pint:
    name: Pint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Check formatting
        run: composer format:test

  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
            phpunit: "^11.0"
          - php: "8.3"
            laravel: "^12.0"
            testbench: "^10.0"
            phpunit: "^11.0|^12.0"
          - php: "8.4"
            laravel: "^13.0"
            testbench: "^11.0"
            phpunit: "^12.5"
          - php: "8.5"
            laravel: "^13.0"
            testbench: "^11.0"
            phpunit: "^12.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            ~/.cache/composer/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Pin framework test dependencies
        run: |
          composer require --dev --no-update \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}"

      - name: Install matrix dependencies
        run: composer update --prefer-dist --no-interaction --with-all-dependencies

      - name: Run tests
        run: composer test
